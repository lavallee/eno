# Publishes all eno workspace packages to PyPI via trusted publishing
# (OIDC — no stored API tokens).
#
# PREREQUISITE: a trusted publisher must be configured on PyPI for EACH
# package. PyPI requires *pending* publishers (used before a project first
# exists) to be unique per (repo, workflow, environment) — so each package
# gets its own GitHub environment, "pypi-<package>":
#
#   package        environment
#   eno            pypi-eno
#   eno-mcp        pypi-eno-mcp
#   eno-service    pypi-eno-service
#
# Register each pending publisher at PyPI → Account settings → Publishing
# with: owner "lavallee", repo "eno", workflow "publish.yml", and the
# environment from the table above. The GitHub environments are created
# automatically on first workflow run.
#
# First release (before the projects exist on PyPI): set up the pending
# publishers, then trigger this workflow manually (workflow_dispatch) or by
# publishing a GitHub Release. Subsequent releases publish automatically.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - eno
          - eno-mcp
          - eno-service
    environment:
      name: pypi-${{ matrix.package }}
      url: https://pypi.org/p/${{ matrix.package }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - name: Check version lockstep
        run: python scripts/check_release_gate.py
      - name: Build ${{ matrix.package }}
        # NB: in a uv workspace, `uv build` writes to the WORKSPACE ROOT dist/
        # by default — pass --out-dir explicitly so the publish step finds
        # only this package's artifacts.
        run: uv build --package ${{ matrix.package }} --out-dir dist-${{ matrix.package }}
      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist-${{ matrix.package }}/
          # Idempotent re-runs: a version already on PyPI is skipped, not an
          # error — needed when a partial publish (a package whose pending
          # publisher was registered late) is completed by re-dispatching.
          skip-existing: true
